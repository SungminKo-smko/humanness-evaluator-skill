channels:
  - nodefaults
  - bioconda
  - conda-forge
dependencies:
  - python = 3.9
  - pip
  - abnumber >= 0.3.2

  - hmmer >= 3.1
  - pip:
      - click >= 7
      - pandas < 2.2
      - sqlalchemy < 2
      - matplotlib
      - seaborn
      - biopython
      - pytest
      - requests
      - tqdm
      - openpyxl
      - safetensors
      - humanize
      - sapiens >= 1.1.0
